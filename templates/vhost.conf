# FPANEL - Nginx Virtual Host Template
# Variables:
#   {domain} - Domain name
#   {username} - System username
#   {document_root} - Document root path
#   {php_version} - PHP version (e.g., 8.2)
#   {socket_path} - PHP-FPM socket path

server {
    listen 80;
    listen [::]:80;
    server_name {domain} www.{domain};
    root {document_root};
    index index.php index.html index.htm;

    access_log /var/log/nginx/{domain}.access.log;
    error_log /var/log/nginx/{domain}.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(\.htaccess|\.htpasswd|\.env|\.git|\.svn|\.hg) {
        deny all;
    }

    location ~* \.(sql|log|conf|bak|backup|swp|swo)$ {
        deny all;
    }

    # WAF Rules - Block common attacks
    # SQL Injection protection
    location ~* "(union|select|insert|update|delete|drop|create|alter|exec|script)" {
        deny all;
        return 403;
    }

    # XSS protection
    location ~* "(<|%3C)([^s]*s)+cript.*(>|%3E)" {
        deny all;
        return 403;
    }

    # Block bad bots
    if ($http_user_agent ~* (bot|crawler|spider|scraper|curl|wget)) {
        return 403;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone={domain}_limit:10m rate=10r/s;
    limit_req zone={domain}_limit burst=20 nodelay;

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:{socket_path};
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # PHP security
        fastcgi_param PHP_VALUE "open_basedir=/var/www/{username}/:/tmp/:/var/tmp/";
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # WordPress specific rules
    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    # XML-RPC protection
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }
}

