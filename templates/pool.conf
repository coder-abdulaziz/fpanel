; FPANEL - PHP-FPM Pool Template
; Variables:
;   {username} - System username
;   {php_version} - PHP version (e.g., 8.2)

[{username}]
; User and group
user = {username}
group = {username}

; Listen socket
listen = /run/php/php{php_version}-{username}.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process manager
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500
pm.process_idle_timeout = 10s

; Logging
slowlog = /var/log/php{php_version}-fpm/{username}-slow.log
request_slowlog_timeout = 30s

; Limits
php_admin_value[memory_limit] = 128M
php_admin_value[max_execution_time] = 30
php_admin_value[max_input_time] = 60
php_admin_value[max_input_vars] = 3000
php_admin_value[post_max_size] = 64M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[max_file_uploads] = 20

; Security
php_admin_value[open_basedir] = /var/www/{username}/:/tmp/:/var/tmp/
php_admin_value[upload_tmp_dir] = /var/www/{username}/tmp
php_admin_value[session.save_path] = /var/www/{username}/tmp
php_admin_value[session.gc_probability] = 0

; Disable dangerous functions
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,pcntl_exec,proc_nice,proc_terminate,proc_get_status,proc_close,leak,apache_child_terminate,posix_kill,posix_mkfifo,posix_getpwuid,posix_setpgid,posix_setsid,posix_setuid,posix_setgid,posix_seteuid,posix_setegid,posix_uname

; Error handling
php_admin_value[display_errors] = Off
php_admin_value[display_startup_errors] = Off
php_admin_value[log_errors] = On
php_admin_value[error_log] = /var/www/{username}/data/logs/php-error.log

; Environment
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /var/www/{username}/tmp
env[TMPDIR] = /var/www/{username}/tmp
env[TEMP] = /var/www/{username}/tmp
